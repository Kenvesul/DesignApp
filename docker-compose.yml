version: "3.9"

# DesignApp v2.0 — Production deployment
#
# Services:
#   web     — Flask/Gunicorn (Python) serving the API + static React bundle
#   nginx   — Reverse proxy, SSL termination, static file serving
#
# Usage:
#   1. Build React:  npm run build   (outputs to ui/static/dist/)
#   2. Build image:  docker compose build
#   3. Start:        docker compose up -d
#   4. Open:         https://your-domain/
#
# Environment variables (set in .env or OS environment):
#   DESIGNAPP_SECRET  — Flask session secret key (required, min 32 chars)
#   PORT              — Internal Gunicorn port (default 5000)
#   WORKERS           — Gunicorn worker count (default 4)

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DESIGNAPP_SECRET: "${DESIGNAPP_SECRET:?DESIGNAPP_SECRET must be set}"
      PORT:             "${PORT:-5000}"
      WORKERS:          "${WORKERS:-4}"
      FLASK_DEBUG:      "0"
      CORS_ORIGIN:      "https://${DOMAIN:-localhost}"
    expose:
      - "${PORT:-5000}"
    volumes:
      # Persist temp files for export (optional, exports are ephemeral by default)
      - /tmp/designapp:/tmp
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-5000}/api/health"]
      interval: 30s
      timeout:   5s
      retries:   3

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/ssl:/etc/nginx/ssl:ro        # Mount your SSL certs here
      - ./ui/static/dist:/srv/static:ro       # React build output
    depends_on:
      - web

volumes: {}
