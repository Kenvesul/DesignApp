<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}DesignApp{% endblock %} - Geotechnical Analysis</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header class="app-header">
  <div class="header-inner">
    <a href="{{ url_for('index') }}" class="brand">
      <span class="brand-icon">[]</span>
      <span class="brand-name">DesignApp</span>
      <span class="brand-sub">Geotechnical Suite</span>
    </a>
    <nav class="main-nav">
      <a href="{{ url_for('foundation_form') }}" class="nav-link">Foundation</a>
      <a href="{{ url_for('wall_form') }}" class="nav-link">Retaining Wall</a>
      <a href="{{ url_for('sheet_pile_form') }}" class="nav-link">Sheet Pile</a>
    </nav>
    <div class="header-badge">EC7 - EN 1997-1:2004</div>
  </div>
</header>

<main class="page-main">
  {% block content %}{% endblock %}
</main>

<footer class="app-footer">
  <div class="footer-inner">
    <span>DesignApp v0.5 - Eurocode 7 EN 1997-1:2004</span>
    <span>All results are engineer's responsibility. Verify inputs before use.</span>
  </div>
</footer>

</body>
</html>
