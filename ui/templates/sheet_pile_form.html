{% extends "base.html" %}
{% block title %}Sheet Pile Analysis{% endblock %}
{% block content %}
<h1>Sheet Pile Analysis</h1>
{% if errors %}<div class="alert">{% for e in errors %}<p>{{ e }}</p>{% endfor %}</div>{% endif %}
<form method="post" action="/sheet-pile/analyse">
  <input name="phi_k" value="{{ prev.phi_k if prev else '38.0' }}" placeholder="φ′_k (°)" required />
  <input name="c_k" value="{{ prev.c_k if prev else '0' }}" placeholder="c′_k (kPa)" />
  <input name="gamma" value="{{ prev.gamma if prev else '20.0' }}" placeholder="γ (kN/m³)" required />
  <input name="h_retain" value="{{ prev.h_retain if prev else '6.0' }}" placeholder="Retained height (m)" required />
  <select name="prop_type">
    <option value="propped_top">Propped at top</option>
    <option value="cantilever">Cantilever</option>
  </select>
  <input name="delta_deg" value="{{ prev.delta_deg if prev else '0' }}" placeholder="Wall friction δ (°)" />
  <input name="surcharge_kpa" value="{{ prev.surcharge_kpa if prev else '0' }}" placeholder="Surcharge (kPa)" />
  <input name="project" value="{{ prev.project if prev else '' }}" placeholder="Project" />
  <input name="job_ref" value="{{ prev.job_ref if prev else '' }}" placeholder="Job ref" />
  <input name="calc_by" value="{{ prev.calc_by if prev else '' }}" placeholder="Calc by" />
  <input name="checked_by" value="{{ prev.checked_by if prev else '' }}" placeholder="Checked by" />
  <button type="submit">Analyse</button>
</form>
{% endblock %}
