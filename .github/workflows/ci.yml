name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  # ── 1. Python backend tests ──────────────────────────────────────────────
  python-tests:
    name: Python Tests (3.12)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install pytest

      - name: Show what pytest can collect
        env:
          PYTHONPATH: .
        run: pytest tests/ --collect-only -q 2>&1 || true

      - name: Run all test suites
        env:
          PYTHONPATH: .
        run: pytest tests/ -v --tb=long --import-mode=importlib

      - name: Calibration smoke-test (Craig examples)
        env:
          PYTHONPATH: .
        run: pytest tests/test_sheet_pile.py tests/test_search.py -v --import-mode=importlib

  # ── 2. React SPA — lint + build ──────────────────────────────────────────
  react-build:
    name: React Build & Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: react-spa

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Lint (skip if no lint script)
        run: npm run lint --if-present || echo "ℹ️  No lint script — skipping"

      - name: Production build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-dist
          path: react-spa/dist/
          retention-days: 7

  # ── 3. Docker build ───────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [python-tests, react-build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t designapp:ci .

  # ── 4. Playwright E2E (main pushes only) ─────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [python-tests, react-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install react-spa dependencies
        working-directory: react-spa
        run: npm install --legacy-peer-deps

      - name: Install root dependencies (@playwright/test)
        run: npm install

      - name: Install Playwright browsers
        # Use local binary — avoids global permission errors
        run: node_modules/.bin/playwright install --with-deps chromium

      - name: Run Playwright tests
        # playwright.config.js webServer: block starts Flask + Vite automatically.
        # Do NOT manually start them here — they would conflict on the same ports.
        env:
          PYTHONPATH: .
          DESIGNAPP_SECRET: ci-test-secret
        run: node_modules/.bin/playwright test --reporter=list

      - name: Upload report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
