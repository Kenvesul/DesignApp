name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  # ── 1. Python backend tests ──────────────────────────────────────────────
  python-tests:
    name: Python Tests (3.12)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install pytest

      - name: Show what pytest can collect
        env:
          PYTHONPATH: .
        run: pytest tests/ --collect-only -q 2>&1 || true

      - name: Run all test suites
        env:
          PYTHONPATH: .
        run: pytest tests/ -v --tb=long --import-mode=importlib

      - name: Calibration smoke-test (Craig examples)
        env:
          PYTHONPATH: .
        run: pytest tests/test_sheet_pile.py tests/test_search.py -v --import-mode=importlib

  # ── 2. React SPA — lint + build ──────────────────────────────────────────
  react-build:
    name: React Build & Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: react-spa

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Lint (skip if no lint script)
        run: npm run lint --if-present || echo "ℹ️  No lint script — skipping"

      - name: Production build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-dist
          path: react-spa/dist/
          retention-days: 7

  # ── 3. Docker build ───────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [python-tests, react-build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t designapp:ci .

  # ── 4. Playwright E2E (main pushes only) ─────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [python-tests, react-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Node dependencies (react-spa)
        working-directory: react-spa
        run: npm install --legacy-peer-deps

      - name: Install root Node dependencies (@playwright/test)
        # playwright.config.js lives at root — needs its own node_modules
        run: npm install

      - name: Install Playwright browsers
        run: node_modules/.bin/playwright install --with-deps chromium

      - name: Start Flask backend (no reloader in CI)
        env:
          PYTHONPATH: .
          DESIGNAPP_SECRET: ci-test-secret
          FLASK_ENV: production       # disables debug reloader
        run: |
          python -m ui.app --no-reload &
          echo "Waiting for Flask on :5000 ..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:5000/api/health > /dev/null; then
              echo "✅ Flask ready (attempt $i)"
              break
            fi
            echo "  attempt $i/30 — waiting..."
            sleep 2
          done
          # Final check — fail loudly if Flask never came up
          curl -sf http://127.0.0.1:5000/api/health || (echo "❌ Flask never started" && exit 1)

      - name: Start Vite dev server
        working-directory: react-spa
        # --host binds Vite to 0.0.0.0 so it's reachable on 127.0.0.1 in CI
        run: npm run dev -- --host &

      - name: Wait for Vite on :5173
        run: |
          echo "Waiting for Vite on :5173 ..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:5173 > /dev/null; then
              echo "✅ Vite ready (attempt $i)"
              break
            fi
            echo "  attempt $i/30 — waiting..."
            sleep 2
          done
          # Final check — fail loudly if Vite never came up
          curl -sf http://127.0.0.1:5173 || (echo "❌ Vite never started" && exit 1)

      - name: Show running processes (debug)
        run: ps aux | grep -E "vite|flask|python|node" | grep -v grep || true

      - name: Run Playwright tests
        run: node_modules/.bin/playwright test --reporter=list

      - name: Upload report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
