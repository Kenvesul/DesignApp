name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  # ── 1. Python backend tests ──────────────────────────────────────────────
  python-tests:
    name: Python Tests (3.12)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run all Python test suites
        run: |
          echo "──────────────────────────────────────"
          echo " Running 20 DesignApp test suites"
          echo "──────────────────────────────────────"
          PASS=0; FAIL=0
          for f in tests/test_*.py; do
            if python "$f"; then
              echo "✅  PASS  $f"
              PASS=$((PASS+1))
            else
              echo "❌  FAIL  $f"
              FAIL=$((FAIL+1))
            fi
          done
          echo ""
          echo "Results: ${PASS} passed, ${FAIL} failed"
          [ "$FAIL" -eq 0 ] || exit 1

      - name: Calibration smoke-test (Craig examples)
        run: |
          python tests/test_sheet_pile.py   # Craig Ex.12.1  <0.002%
          python tests/test_search.py       # Craig Ex.9.1   FoS=1.441

  # ── 2. React SPA – lint + build ─────────────────────────────────────────
  react-build:
    name: React Build & Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: react-spa

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: react-spa/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Production build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-dist
          path: react-spa/dist/
          retention-days: 7

  # ── 3. Docker image builds cleanly ──────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [python-tests, react-build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t designapp:ci .

  # ── 4. Playwright E2E (runs only when Flask + Vite can both start) ───────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [python-tests, react-build]
    # Only run on pushes to main (not on every PR to save minutes)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: react-spa/package-lock.json

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Node dependencies
        run: npm ci
        working-directory: react-spa

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start Flask backend
        run: |
          DESIGNAPP_SECRET=ci-test-secret python -m ui.app &
          echo "Flask PID=$!"
          # Wait until Flask is accepting connections
          for i in $(seq 1 20); do
            curl -sf http://127.0.0.1:5000/api/health && break || sleep 1
          done

      - name: Start Vite dev server
        run: npm run dev &
        working-directory: react-spa

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
