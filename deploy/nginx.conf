# deploy/nginx.conf — DesignApp v2.0 production Nginx config
#
# Responsibilities:
#   - SSL termination (port 443)
#   - Serve React static bundle from /srv/static
#   - Proxy /api/* to Gunicorn (Flask)
#   - HTTP → HTTPS redirect

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── React SPA static assets ───────────────────────────────────────────────
    root  /srv/static;
    index index.html;

    location / {
        # SPA routing — all unknown paths → index.html
        try_files $uri $uri/ /index.html;
    }

    # Long-lived cache for hashed assets
    location ~* \.(js|css|woff2?|png|svg|ico)$ {
        expires  1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Flask API proxy ────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://web:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Analysis can take up to 60 s for large grids
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Legacy Jinja2 routes (kept active during transition)
    location ~ ^/(slope|foundation|wall|sheet-pile|project) {
        proxy_pass       http://web:5000;
        proxy_set_header Host $host;
    }
}
